<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WoMo Karte</title>
  <meta name="theme-color" content="#2563eb">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%232563eb' d='M18,8H15V4H3V17H5A3,3 0 0,0 11,17H13A3,3 0 0,0 19,17H21V12L18,8M6.5,18.5A1.5,1.5 0 0,1 5,17A1.5,1.5 0 0,1 6.5,15.5A1.5,1.5 0 0,1 8,17A1.5,1.5 0 0,1 6.5,18.5M16.5,18.5A1.5,1.5 0 0,1 15,17A1.5,1.5 0 0,1 16.5,15.5A1.5,1.5 0 0,1 18,17A1.5,1.5 0 0,1 16.5,18.5M15,12V9.5H17.5L19.46,12H15Z'/></svg>">
  <link rel="stylesheet" href="ui.css">
  <link rel="stylesheet" href="/assets/leaflet/leaflet.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0b132b;
      color: white;
    }

    #map {
      width: 100%;
      height: 100%;
      min-height: 100dvh;
    }

    .map-data-overlay {
      position: absolute;
      inset: 0;
      z-index: 500;
      pointer-events: none;
      background: rgba(11, 19, 43, 0.25);
      opacity: 0;
      transition: opacity 180ms ease;
    }

    .map-data-overlay.visible {
      opacity: 1;
    }

    .info {
      position: absolute;
      z-index: 1000;
      top: 10px;
      left: 10px;
      right: 10px;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(11, 19, 43, 0.92);
      backdrop-filter: blur(6px);
      font-size: 0.82rem;
      line-height: 1.3;
      box-shadow: 0 4px 12px rgba(0,0,0,.3);
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .status-line {
      font-weight: 700;
    }

    .status-value {
      font-weight: 600;
    }

    .status-meta {
      color: #b8c1d1;
      font-weight: 500;
    }

    .toolbar-row {
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .nav-links {
      display: flex;
      justify-content: flex-start;
      gap: 6px;
      flex-wrap: wrap;
    }

    .gps-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    .gps-title {
      font-weight: 700;
    }

    .gps-sub {
      margin-top: 2px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      color: #b8c1d1;
    }

    .range-row {
      margin-top: 8px;
      display: grid;
      grid-template-columns: 1fr 1fr auto auto;
      gap: 6px;
      align-items: center;
    }

    .range-row input,
    .export-link {
      min-height: 30px;
      border: 0;
      border-radius: 8px;
      font: inherit;
      font-size: 0.76rem;
    }

    .range-row input {
      box-sizing: border-box;
      width: 100%;
      padding: 4px 6px;
      background: rgba(255,255,255,0.14);
      color: inherit;
    }

    .export-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 8px;
      background: rgba(255,255,255,0.16);
      color: #f3f4f6;
      text-decoration: none;
      font-weight: 700;
    }

    .export-link.disabled {
      opacity: 0.42;
      pointer-events: none;
    }

    .range-error {
      margin-top: 5px;
      min-height: 1em;
      color: #fca5a5;
      font-size: 0.74rem;
    }

    .track-tabs {
      display: flex;
      gap: 5px;
      white-space: nowrap;
    }

    .track-tab {
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 4px 8px;
      background: rgba(255,255,255,0.16);
      color: #f3f4f6;
      font-size: 0.76rem;
      font-weight: 600;
    }

    .track-tab.active {
      border-color: rgba(0,0,0,.62);
      background: #2563eb;
      color: white;
      box-shadow: 0 0 0 1px rgba(255,255,255,.16) inset;
    }

    .track-tab:disabled,
    .range-row input:disabled {
      opacity: 0.42;
      cursor: not-allowed;
    }

    .leaflet-bottom.leaflet-right {
      bottom: 14px;
      right: 10px;
    }

    .map-action {
      width: 30px;
      height: 30px;
      line-height: 30px;
      display: block;
      text-align: center;
      background: white;
      color: black;
      text-decoration: none;
      font: bold 15px Arial, sans-serif;
      border-top: 1px solid #ccc;
    }

    .map-action.disabled {
      color: #9ca3af;
      pointer-events: none;
    }

    .last-position-marker {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid white;
      border-radius: 50% 50% 50% 0;
      background: #6b7280;
      color: white;
      font: 800 16px/1 system-ui, sans-serif;
      box-shadow: 0 2px 7px rgba(0,0,0,.45);
      transform: rotate(-45deg);
    }

    .last-position-marker span {
      transform: rotate(45deg);
    }

    @media (prefers-color-scheme: light) {
      .info {
        background: rgba(255,255,255,0.92);
        color: #111827;
      }

      .gps-sub {
        color: #374151;
      }

      .status-meta {
        color: #374151;
      }

      .track-tab {
        background: rgba(17,24,39,0.10);
        color: #111827;
      }

      .track-tab.active {
        background: #2563eb;
        color: white;
      }

      .range-row input {
        background: rgba(17,24,39,0.08);
        color: #111827;
      }

      .export-link {
        background: rgba(17,24,39,0.10);
        color: #111827;
      }

      .range-error {
        color: #b91c1c;
      }
    }

    @media (max-width: 430px) {
      .info {
        padding: 6px 8px;
        font-size: 0.76rem;
      }

      .top-row {
        display: block;
      }

      .status-line {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .toolbar-row {
        gap: 6px;
        flex-wrap: nowrap;
      }

      .nav-links {
        justify-content: flex-start;
        flex-wrap: nowrap;
        gap: 3px;
      }

      .womo-nav-link {
        min-height: 22px;
        padding: 0 6px;
        font-size: 0.70rem;
      }

      .track-tabs {
        gap: 3px;
      }

      .track-tab {
        padding: 3px 7px;
        font-size: 0.70rem;
      }

      .gps-row {
        align-items: flex-start;
        margin-top: 6px;
      }

      .gps-sub {
        display: block;
      }

      .gps-sub a {
        display: inline-block;
        margin-top: 2px;
      }

      .range-row {
        margin-top: 6px;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) auto auto;
      }

      .range-row input,
      .export-link {
        min-height: 26px;
        font-size: 0.70rem;
      }

      .export-link {
        padding: 0 6px;
      }

      .range-error {
        min-height: 0;
      }
    }

    @media (max-width: 340px) {
      .toolbar-row {
        gap: 5px;
      }

      .nav-links {
        gap: 3px;
      }

      .womo-nav-link {
        padding: 0 4px;
        font-size: 0.64rem;
      }

      .track-tabs {
        gap: 3px;
      }

      .track-tab {
        padding: 3px 5px;
        font-size: 0.64rem;
      }
    }
  </style>
</head>

<body>
  <div class="info">
    <div class="status-line">
      <span class="gps-title">WoMo GPS:</span>
      <span id="coords" class="status-value">Lade GPS...</span>
      <span class="status-meta"> - fix: <span id="satfix">-</span></span>
    </div>

    <div class="toolbar-row">
      <nav class="nav-links" aria-label="Navigation">
        <a id="routerGuiLink" class="womo-nav-link" href="https://192.168.11.1" target="_blank" rel="noopener noreferrer">RUTX11</a>
        <a id="googlemaps" class="womo-nav-link disabled" href="#" target="_blank" rel="noopener noreferrer">Google Maps</a>
        <a class="womo-nav-link" href="tilt.html" target="_blank" rel="noopener noreferrer">Tilt</a>
        <a id="trumaLink" class="womo-nav-link" href="http://192.168.11.4" target="_blank" rel="noopener noreferrer">Truma</a>
      </nav>

      <div class="track-tabs">
        <button class="track-tab active" data-range="1h">Live</button>
        <button class="track-tab" data-range="24h">24h</button>
        <button class="track-tab" data-range="4w">4w</button>
      </div>
    </div>

    <div class="range-row">
      <input id="fromDate" type="date" aria-label="Von">
      <input id="toDate" type="date" aria-label="Bis">
      <a id="csvExport" class="export-link disabled" href="#" download>CSV</a>
      <a id="gpxExport" class="export-link disabled" href="#" download>GPX</a>
    </div>
    <div id="rangeError" class="range-error"></div>
  </div>

  <div id="map"></div>
  <div id="mapDataOverlay" class="map-data-overlay visible" aria-hidden="true"></div>

  <script src="portal-config.js"></script>
  <script src="/assets/leaflet/leaflet.js"></script>

  <script>
    const PORTAL_CONFIG = window.WOMO_PORTAL_CONFIG || {};
    const DEFAULT_ZOOM = 16;
    const MAX_ZOOM = 19;
    const MAX_RANGE_DAYS = 365;
    const MAP_EDGE_PADDING = 16;

    let currentRange = '1h';
    let customFrom = '';
    let customTo = '';
    let resizeTimer = null;
    let autoFollow = true;
    let programmaticMove = false;

    const map = L.map('map', { zoomControl: false }).setView([51.0, 10.0], DEFAULT_ZOOM);

    const zoomControl = L.control.zoom({ position: 'bottomright' }).addTo(map);
    L.DomUtil.create('a', 'map-action locate-button', zoomControl._container);
    L.DomUtil.create('a', 'map-action fit-button disabled', zoomControl._container);

    const locateButton = zoomControl._container.querySelector('.locate-button');
    locateButton.href = '#';
    locateButton.title = 'Aktuellen Standort zentrieren';
    locateButton.textContent = '⦿';

    const fitButton = zoomControl._container.querySelector('.fit-button');
    fitButton.href = '#';
    fitButton.title = 'Track einpassen';
    fitButton.textContent = '⛶';
    const zoomInButton = zoomControl._container.querySelector('.leaflet-control-zoom-in');
    const zoomOutButton = zoomControl._container.querySelector('.leaflet-control-zoom-out');

    const marker = L.marker([51.0, 10.0]);
    const lastPositionIcon = L.divIcon({
      className: '',
      html: '<div class="last-position-marker"><span>?</span></div>',
      iconSize: [28, 28],
      iconAnchor: [14, 28]
    });
    const lastPositionMarker = L.marker([51.0, 10.0], { icon: lastPositionIcon });
    let historyLine = null;
    let historyMarkers = [];
    let historyRequestId = 0;
    let activeHistoryLatLngs = [];
    let firstFix = true;
    let lastLat = null;
    let lastLon = null;
    let hasCurrentGpsFix = false;
    let lastHistoryLatLng = null;

    const fromDateInput = document.getElementById('fromDate');
    const toDateInput = document.getElementById('toDate');
    const historyRangeButtons = Array.from(document.querySelectorAll('.track-tab')).filter(function(button) {
      return button.dataset.range !== '1h';
    });
    const rangeError = document.getElementById('rangeError');
    const csvExport = document.getElementById('csvExport');
    const gpxExport = document.getElementById('gpxExport');
    const mapDataOverlay = document.getElementById('mapDataOverlay');
    const infoPanel = document.querySelector('.info');
    const routerGuiLink = document.getElementById('routerGuiLink');
    const trumaLink = document.getElementById('trumaLink');

    function configuredUrl(value, fallback) {
      const text = String(value || fallback || '').trim();
      return text || fallback;
    }

    routerGuiLink.href = configuredUrl(PORTAL_CONFIG.routerGuiUrl, routerGuiLink.href);
    trumaLink.href = configuredUrl(PORTAL_CONFIG.trumaUrl, trumaLink.href);

    function syncMapSize() {
      const viewport = window.visualViewport;
      const height = viewport ? viewport.height : window.innerHeight;

      document.getElementById('map').style.height = Math.max(320, Math.floor(height)) + 'px';
      map.invalidateSize();
    }

    function visibleMapPadding() {
      const panelRect = infoPanel.getBoundingClientRect();
      const topPadding = Math.ceil(panelRect.bottom + MAP_EDGE_PADDING);

      return {
        paddingTopLeft: [MAP_EDGE_PADDING, topPadding],
        paddingBottomRight: [MAP_EDGE_PADDING, MAP_EDGE_PADDING]
      };
    }

    function visibleCenterPoint() {
      const size = map.getSize();
      const padding = visibleMapPadding();
      const left = padding.paddingTopLeft[0];
      const top = padding.paddingTopLeft[1];
      const right = size.x - padding.paddingBottomRight[0];
      const bottom = size.y - padding.paddingBottomRight[1];

      return L.point((left + right) / 2, (top + bottom) / 2);
    }

    function setViewBelowOverlay(latlng, zoom) {
      const targetZoom = zoom === undefined ? map.getZoom() : zoom;
      const centerPoint = map.project(latlng, targetZoom);
      const padding = visibleMapPadding();
      const yOffset = (padding.paddingTopLeft[1] - padding.paddingBottomRight[1]) / 2;
      const shiftedCenter = map.unproject([centerPoint.x, centerPoint.y - yOffset], targetZoom);

      programmaticMove = true;
      map.setView(shiftedCenter, targetZoom);
    }

    function scheduleMapResize() {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(function() {
        syncMapSize();

        if (autoFollow && lastLat !== null && lastLon !== null) {
          setViewBelowOverlay([lastLat, lastLon], map.getZoom());
        }
      }, 120);
    }

    locateButton.addEventListener('click', function (event) {
      event.preventDefault();

      if (lastLat !== null && lastLon !== null) {
        autoFollow = true;
        setViewBelowOverlay([lastLat, lastLon], DEFAULT_ZOOM);
      } else {
        autoFollow = true;
        programmaticMove = true;
        map.setZoom(DEFAULT_ZOOM);
      }
    });

    fitButton.addEventListener('click', function (event) {
      event.preventDefault();

      if (activeHistoryLatLngs.length > 0) {
        fitHistory(activeHistoryLatLngs);
      }
    });

    function zoomAroundVisibleCenter(event, delta) {
      event.preventDefault();
      event.stopImmediatePropagation();

      const targetZoom = map.getZoom() + delta;
      if (targetZoom > map.getMaxZoom() || targetZoom < map.getMinZoom()) {
        return;
      }

      autoFollow = false;
      programmaticMove = true;
      map.setZoomAround(visibleCenterPoint(), targetZoom);
    }

    zoomInButton.addEventListener('click', function(event) {
      zoomAroundVisibleCenter(event, 1);
    }, true);

    zoomOutButton.addEventListener('click', function(event) {
      zoomAroundVisibleCenter(event, -1);
    }, true);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors',
      maxZoom: MAX_ZOOM
    }).addTo(map);

    map.on('movestart zoomstart', function() {
      if (programmaticMove) {
        return;
      }

      autoFollow = false;
    });

    map.on('moveend zoomend', function() {
      if (programmaticMove) {
        programmaticMove = false;
        return;
      }

      if (autoFollow && lastLat !== null && lastLon !== null) {
        setViewBelowOverlay([lastLat, lastLon], map.getZoom());
      }
    });

    function formatDateTime(value) {
      if (!value) return '-';

      const parts = value.split(' ');
      if (parts.length !== 2) return value;

      const dateParts = parts[0].split('-');
      if (dateParts.length !== 3) return value;

      return dateParts[2] + '.' + dateParts[1] + '.' + dateParts[0] + ', ' + parts[1];
    }

    function dateToUtc(value) {
      const parts = value.split('-');
      if (parts.length !== 3) return null;

      const year = Number(parts[0]);
      const month = Number(parts[1]);
      const day = Number(parts[2]);

      if (!year || !month || !day) return null;

      return Date.UTC(year, month - 1, day);
    }

    function setExportState(enabled) {
      csvExport.classList.toggle('disabled', !enabled);
      gpxExport.classList.toggle('disabled', !enabled);

      if (!enabled) {
        csvExport.href = '#';
        gpxExport.href = '#';
        return;
      }

      const query = '?from=' + encodeURIComponent(customFrom) + '&to=' + encodeURIComponent(customTo);
      csvExport.href = '/cgi-bin/gps_export.cgi' + query + '&format=csv';
      gpxExport.href = '/cgi-bin/gps_export.cgi' + query + '&format=gpx';
    }

    function validateCustomRange() {
      const from = fromDateInput.value;
      const to = toDateInput.value;

      customFrom = '';
      customTo = '';
      rangeError.textContent = '';
      setExportState(false);

      if (!from && !to) return false;

      if (!from || !to) {
        rangeError.textContent = 'Von und Bis auswählen';
        return false;
      }

      const fromTs = dateToUtc(from);
      const toTs = dateToUtc(to);

      if (fromTs === null || toTs === null) {
        rangeError.textContent = 'Ungültiges Datum';
        return false;
      }

      if (fromTs > toTs) {
        rangeError.textContent = 'Von muss vor Bis liegen';
        return false;
      }

      const days = Math.floor((toTs - fromTs) / 86400000) + 1;
      if (days > MAX_RANGE_DAYS) {
        rangeError.textContent = 'Maximal 365 Tage';
        return false;
      }

      customFrom = from;
      customTo = to;
      setExportState(true);
      return true;
    }

    function historyUrl() {
      if (customFrom && customTo) {
        return '/cgi-bin/gps_track.cgi?from=' + encodeURIComponent(customFrom) + '&to=' + encodeURIComponent(customTo) + '&_=' + Date.now();
      }

      return '/cgi-bin/gps_track.cgi?range=' + currentRange + '&_=' + Date.now();
    }

    function fitHistory(latlngs) {
      if (latlngs.length === 1) {
        setViewBelowOverlay(latlngs[0], DEFAULT_ZOOM);
        return;
      }

      map.fitBounds(L.latLngBounds(latlngs), {
        ...visibleMapPadding(),
        maxZoom: DEFAULT_ZOOM
      });
    }

    function updateFitButtonState() {
      fitButton.classList.toggle('disabled', activeHistoryLatLngs.length < 1);
    }

    function setHistoryControlsEnabled(enabled) {
      historyRangeButtons.forEach(function(button) {
        button.disabled = !enabled;
      });
      fromDateInput.disabled = !enabled;
      toDateInput.disabled = !enabled;
      if (!enabled && currentRange !== '1h') {
        currentRange = '1h';
        setActiveRangeButton(currentRange);
      }
    }

    function setActiveRangeButton(range) {
      document.querySelectorAll('.track-tab').forEach(function(item) {
        item.classList.toggle('active', item.dataset.range === range);
      });
    }

    function setGoogleMapsPosition(latlng) {
      const link = document.getElementById('googlemaps');
      link.href = 'https://www.google.com/maps?q=' + latlng[0] + ',' + latlng[1];
      link.classList.remove('disabled');
    }

    function clearGoogleMapsPosition() {
      const link = document.getElementById('googlemaps');
      link.href = '#';
      link.classList.add('disabled');
    }

    function updateMapDataOverlay() {
      mapDataOverlay.classList.toggle('visible', !hasCurrentGpsFix && !lastHistoryLatLng);
    }

    function showCurrentPosition(latlng) {
      if (map.hasLayer(lastPositionMarker)) map.removeLayer(lastPositionMarker);
      marker.setLatLng(latlng);
      if (!map.hasLayer(marker)) marker.addTo(map);
      setGoogleMapsPosition(latlng);
      hasCurrentGpsFix = true;
      updateMapDataOverlay();
    }

    function showLastKnownPosition(latlng) {
      if (!latlng) return;
      if (map.hasLayer(marker)) map.removeLayer(marker);
      lastPositionMarker.setLatLng(latlng);
      if (!map.hasLayer(lastPositionMarker)) lastPositionMarker.addTo(map);
      setGoogleMapsPosition(latlng);
      hasCurrentGpsFix = false;
      updateMapDataOverlay();
    }

    function hidePositionMarkers() {
      if (map.hasLayer(marker)) map.removeLayer(marker);
      if (map.hasLayer(lastPositionMarker)) map.removeLayer(lastPositionMarker);
      clearGoogleMapsPosition();
      hasCurrentGpsFix = false;
      updateMapDataOverlay();
    }

    function clearHistoryLayers() {
      if (historyLine) {
        map.removeLayer(historyLine);
        historyLine = null;
      }

      historyMarkers.forEach(function(item) {
        map.removeLayer(item);
      });

      historyMarkers = [];
      activeHistoryLatLngs = [];
      updateFitButtonState();
    }

    function normalizeHistory(history) {
      if (!Array.isArray(history)) return [];

      return history.map(function(point) {
        const lat = Number(point.lat);
        const lon = Number(point.lon);

        if (!isFinite(lat) || !isFinite(lon)) {
          return null;
        }

        return [lat, lon];
      }).filter(function(point) {
        return point !== null;
      });
    }

    async function updateHistory(options) {
      const shouldFit = options && options.fit;
      const requestId = historyRequestId + 1;
      const url = historyUrl();
      historyRequestId = requestId;

      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error('GPS history HTTP ' + response.status);

        const history = await response.json();

        if (requestId !== historyRequestId) {
          return;
        }

        clearHistoryLayers();

        const latlngs = normalizeHistory(history);
        if (latlngs.length < 1) {
          lastHistoryLatLng = null;
          if (!hasCurrentGpsFix) hidePositionMarkers();
          updateMapDataOverlay();
          setHistoryControlsEnabled(false);
          return;
        }

        activeHistoryLatLngs = latlngs;
        lastHistoryLatLng = latlngs[latlngs.length - 1];
        updateFitButtonState();
        updateMapDataOverlay();
        setHistoryControlsEnabled(true);

        if (latlngs.length >= 2) {
          historyLine = L.polyline(latlngs, {
            color: '#60a5fa',
            weight: 3,
            opacity: 0.7
          }).addTo(map);

          historyLine.bringToFront();
        }

        latlngs.forEach(function(point) {
          const circle = L.circleMarker(point, {
            radius: 6,
            color: '#1d4ed8',
            fillColor: '#60a5fa',
            fillOpacity: 0.8,
            weight: 2
          }).addTo(map);

          circle.bringToFront();
          historyMarkers.push(circle);
        });

        if (!hasCurrentGpsFix && lastHistoryLatLng) {
          showLastKnownPosition(lastHistoryLatLng);
        }

        if (!hasCurrentGpsFix && firstFix && lastHistoryLatLng) {
          setViewBelowOverlay(lastHistoryLatLng, DEFAULT_ZOOM);
          firstFix = false;
        } else if (shouldFit) {
          fitHistory(latlngs);
        }

      } catch (err) {
        console.warn('GPS history update failed', err);
      }
    }

    async function updateGPS() {
      try {
        const response = await fetch('/cgi-bin/gps.json?_=' + Date.now());
        const data = await response.json();

        const lat = parseFloat(data.latitude);
        const lon = parseFloat(data.longitude);

        if (isNaN(lat) || isNaN(lon)) {
          document.getElementById('coords').textContent = lastHistoryLatLng ? 'GPS Fehler · letzte Position' : 'Keine gültigen GPS-Daten';
          document.getElementById('satfix').textContent = '-';
          if (lastHistoryLatLng) {
            showLastKnownPosition(lastHistoryLatLng);
          } else {
            hidePositionMarkers();
          }
          return;
        }

        document.getElementById('coords').textContent = lat.toFixed(6) + ', ' + lon.toFixed(6);
        document.getElementById('satfix').textContent = formatDateTime(data.datetime);
        showCurrentPosition([lat, lon]);
        lastLat = lat;
        lastLon = lon;

        if (firstFix) {
          setViewBelowOverlay([lat, lon], DEFAULT_ZOOM);
          firstFix = false;
        }

      } catch (err) {
        document.getElementById('coords').textContent = lastHistoryLatLng ? 'GPS Fehler · letzte Position' : 'GPS Fehler';
        document.getElementById('satfix').textContent = '-';
        if (lastHistoryLatLng) {
          showLastKnownPosition(lastHistoryLatLng);
        } else {
          hidePositionMarkers();
        }
      }
    }

    document.querySelectorAll('.track-tab').forEach(function(button) {
      button.addEventListener('click', function() {
        if (button.disabled) return;
        currentRange = button.dataset.range;
        setActiveRangeButton(currentRange);
        fromDateInput.value = '';
        toDateInput.value = '';
        customFrom = '';
        customTo = '';
        rangeError.textContent = '';
        setExportState(false);
        updateHistory({ fit: true });
      });
    });

    [fromDateInput, toDateInput].forEach(function(input) {
      input.addEventListener('change', function() {
        document.querySelectorAll('.track-tab').forEach(function(item) {
          item.classList.remove('active');
        });

        if (validateCustomRange()) {
          updateHistory({ fit: true });
        }
      });
    });

    syncMapSize();
    window.addEventListener('resize', scheduleMapResize);

    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', scheduleMapResize);
      window.visualViewport.addEventListener('scroll', scheduleMapResize);
    }

    setHistoryControlsEnabled(false);
    updateGPS();
    updateHistory({ fit: true });

    setInterval(updateGPS, 5000);
    setInterval(function() {
      updateHistory({ fit: false });
    }, 5000);
  </script>
</body>
</html>
