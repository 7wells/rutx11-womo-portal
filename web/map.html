<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WoMo Karte</title>
  <meta name="theme-color" content="#2563eb">
  <link rel="stylesheet" href="/assets/leaflet/leaflet.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0b132b;
      color: white;
      font-family: system-ui, sans-serif;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .info {
      position: absolute;
      z-index: 1000;
      top: 10px;
      left: 10px;
      right: 10px;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(11, 19, 43, 0.92);
      backdrop-filter: blur(6px);
      font-size: 0.82rem;
      line-height: 1.3;
      box-shadow: 0 4px 12px rgba(0,0,0,.3);
    }

    .gps-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .gps-title {
      font-weight: 700;
    }

    .gps-sub {
      margin-top: 2px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      color: #b8c1d1;
    }

    .range-row {
      margin-top: 8px;
      display: grid;
      grid-template-columns: 1fr 1fr auto auto;
      gap: 6px;
      align-items: center;
    }

    .range-row input,
    .export-link {
      min-height: 30px;
      border: 0;
      border-radius: 8px;
      font: inherit;
      font-size: 0.76rem;
    }

    .range-row input {
      box-sizing: border-box;
      width: 100%;
      padding: 4px 6px;
      background: rgba(255,255,255,0.14);
      color: inherit;
    }

    .export-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 8px;
      background: rgba(255,255,255,0.16);
      color: #f3f4f6;
      text-decoration: none;
      font-weight: 700;
    }

    .export-link.disabled {
      opacity: 0.42;
      pointer-events: none;
    }

    .range-error {
      margin-top: 5px;
      min-height: 1em;
      color: #fca5a5;
      font-size: 0.74rem;
    }

    .info a {
      color: #93c5fd;
      text-decoration: none;
      font-weight: 600;
      white-space: nowrap;
    }

    .track-tabs {
      display: flex;
      gap: 5px;
      white-space: nowrap;
    }

    .track-tab {
      border: 0;
      border-radius: 999px;
      padding: 4px 8px;
      background: rgba(255,255,255,0.16);
      color: #f3f4f6;
      font-size: 0.76rem;
      font-weight: 600;
    }

    .track-tab.active {
      background: #2563eb;
      color: white;
    }

    .leaflet-bottom.leaflet-right {
      bottom: 14px;
      right: 10px;
    }

    .map-action {
      width: 30px;
      height: 30px;
      line-height: 30px;
      display: block;
      text-align: center;
      background: white;
      color: black;
      text-decoration: none;
      font: bold 15px Arial, sans-serif;
      border-top: 1px solid #ccc;
    }

    .map-action.disabled {
      color: #9ca3af;
      pointer-events: none;
    }

    @media (prefers-color-scheme: light) {
      .info {
        background: rgba(255,255,255,0.92);
        color: #111827;
      }

      .gps-sub {
        color: #374151;
      }

      .info a {
        color: #1d4ed8;
      }

      .track-tab {
        background: rgba(17,24,39,0.10);
        color: #111827;
      }

      .track-tab.active {
        background: #2563eb;
        color: white;
      }

      .range-row input {
        background: rgba(17,24,39,0.08);
        color: #111827;
      }

      .export-link {
        background: rgba(17,24,39,0.10);
        color: #111827;
      }

      .range-error {
        color: #b91c1c;
      }
    }

    @media (max-width: 430px) {
      .range-row {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="info">
    <div class="gps-row">
      <div>
        <span class="gps-title">WoMo GPS:</span>
        <br>
        <span id="coords">Lade GPS...</span>
      </div>

      <div class="track-tabs">
        <button class="track-tab active" data-range="1h">Live</button>
        <button class="track-tab" data-range="24h">24h</button>
        <button class="track-tab" data-range="4w">4w</button>
      </div>
    </div>

    <div class="gps-sub">
      <span>Sat fix: <span id="satfix">-</span></span>
      <a id="googlemaps" href="#" target="_blank" rel="noopener noreferrer">Google Maps</a>
    </div>

    <div class="range-row">
      <input id="fromDate" type="date" aria-label="Von">
      <input id="toDate" type="date" aria-label="Bis">
      <a id="csvExport" class="export-link disabled" href="#" download>CSV</a>
      <a id="gpxExport" class="export-link disabled" href="#" download>GPX</a>
    </div>
    <div id="rangeError" class="range-error"></div>
  </div>

  <div id="map"></div>

  <script src="/assets/leaflet/leaflet.js"></script>

  <script>
    const DEFAULT_ZOOM = 16;
    const MAX_ZOOM = 19;
    const MAX_RANGE_DAYS = 365;

    let currentRange = '1h';
    let customFrom = '';
    let customTo = '';

    const map = L.map('map', { zoomControl: false }).setView([51.0, 10.0], DEFAULT_ZOOM);

    const zoomControl = L.control.zoom({ position: 'bottomright' }).addTo(map);
    L.DomUtil.create('a', 'map-action locate-button', zoomControl._container);
    L.DomUtil.create('a', 'map-action fit-button disabled', zoomControl._container);

    const locateButton = zoomControl._container.querySelector('.locate-button');
    locateButton.href = '#';
    locateButton.title = 'Aktuellen Standort zentrieren';
    locateButton.textContent = '⦿';

    const fitButton = zoomControl._container.querySelector('.fit-button');
    fitButton.href = '#';
    fitButton.title = 'Track einpassen';
    fitButton.textContent = '⛶';

    const marker = L.marker([51.0, 10.0]).addTo(map);
    let historyLine = null;
    let historyMarkers = [];
    let historyRequestId = 0;
    let activeHistoryLatLngs = [];
    let firstFix = true;
    let lastLat = null;
    let lastLon = null;

    const fromDateInput = document.getElementById('fromDate');
    const toDateInput = document.getElementById('toDate');
    const rangeError = document.getElementById('rangeError');
    const csvExport = document.getElementById('csvExport');
    const gpxExport = document.getElementById('gpxExport');

    locateButton.addEventListener('click', function (event) {
      event.preventDefault();

      if (lastLat !== null && lastLon !== null) {
        map.setView([lastLat, lastLon], DEFAULT_ZOOM);
      } else {
        map.setZoom(DEFAULT_ZOOM);
      }
    });

    fitButton.addEventListener('click', function (event) {
      event.preventDefault();

      if (activeHistoryLatLngs.length > 0) {
        fitHistory(activeHistoryLatLngs);
      }
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors',
      maxZoom: MAX_ZOOM
    }).addTo(map);

    function formatDateTime(value) {
      if (!value) return '-';

      const parts = value.split(' ');
      if (parts.length !== 2) return value;

      const dateParts = parts[0].split('-');
      if (dateParts.length !== 3) return value;

      return dateParts[2] + '.' + dateParts[1] + '.' + dateParts[0] + ', ' + parts[1];
    }

    function dateToUtc(value) {
      const parts = value.split('-');
      if (parts.length !== 3) return null;

      const year = Number(parts[0]);
      const month = Number(parts[1]);
      const day = Number(parts[2]);

      if (!year || !month || !day) return null;

      return Date.UTC(year, month - 1, day);
    }

    function setExportState(enabled) {
      csvExport.classList.toggle('disabled', !enabled);
      gpxExport.classList.toggle('disabled', !enabled);

      if (!enabled) {
        csvExport.href = '#';
        gpxExport.href = '#';
        return;
      }

      const query = '?from=' + encodeURIComponent(customFrom) + '&to=' + encodeURIComponent(customTo);
      csvExport.href = '/cgi-bin/gps_export.cgi' + query + '&format=csv';
      gpxExport.href = '/cgi-bin/gps_export.cgi' + query + '&format=gpx';
    }

    function validateCustomRange() {
      const from = fromDateInput.value;
      const to = toDateInput.value;

      customFrom = '';
      customTo = '';
      rangeError.textContent = '';
      setExportState(false);

      if (!from && !to) return false;

      if (!from || !to) {
        rangeError.textContent = 'Von und Bis auswählen';
        return false;
      }

      const fromTs = dateToUtc(from);
      const toTs = dateToUtc(to);

      if (fromTs === null || toTs === null) {
        rangeError.textContent = 'Ungültiges Datum';
        return false;
      }

      if (fromTs > toTs) {
        rangeError.textContent = 'Von muss vor Bis liegen';
        return false;
      }

      const days = Math.floor((toTs - fromTs) / 86400000) + 1;
      if (days > MAX_RANGE_DAYS) {
        rangeError.textContent = 'Maximal 365 Tage';
        return false;
      }

      customFrom = from;
      customTo = to;
      setExportState(true);
      return true;
    }

    function historyUrl() {
      if (customFrom && customTo) {
        return '/cgi-bin/gps_track.cgi?from=' + encodeURIComponent(customFrom) + '&to=' + encodeURIComponent(customTo) + '&_=' + Date.now();
      }

      return '/cgi-bin/gps_track.cgi?range=' + currentRange + '&_=' + Date.now();
    }

    function fitHistory(latlngs) {
      if (latlngs.length === 1) {
        map.setView(latlngs[0], DEFAULT_ZOOM);
        return;
      }

      map.fitBounds(L.latLngBounds(latlngs), {
        paddingTopLeft: [16, 92],
        paddingBottomRight: [16, 16],
        maxZoom: DEFAULT_ZOOM
      });
    }

    function updateFitButtonState() {
      fitButton.classList.toggle('disabled', activeHistoryLatLngs.length < 1);
    }

    function clearHistoryLayers() {
      if (historyLine) {
        map.removeLayer(historyLine);
        historyLine = null;
      }

      historyMarkers.forEach(function(item) {
        map.removeLayer(item);
      });

      historyMarkers = [];
      activeHistoryLatLngs = [];
      updateFitButtonState();
    }

    function normalizeHistory(history) {
      if (!Array.isArray(history)) return [];

      return history.map(function(point) {
        const lat = Number(point.lat);
        const lon = Number(point.lon);

        if (!isFinite(lat) || !isFinite(lon)) {
          return null;
        }

        return [lat, lon];
      }).filter(function(point) {
        return point !== null;
      });
    }

    async function updateHistory(options) {
      const shouldFit = options && options.fit;
      const requestId = historyRequestId + 1;
      const url = historyUrl();
      historyRequestId = requestId;

      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error('GPS history HTTP ' + response.status);

        const history = await response.json();

        if (requestId !== historyRequestId) {
          return;
        }

        clearHistoryLayers();

        const latlngs = normalizeHistory(history);
        if (latlngs.length < 1) {
          return;
        }

        activeHistoryLatLngs = latlngs;
        updateFitButtonState();

        if (latlngs.length >= 2) {
          historyLine = L.polyline(latlngs, {
            color: '#60a5fa',
            weight: 3,
            opacity: 0.7
          }).addTo(map);

          historyLine.bringToFront();
        }

        latlngs.forEach(function(point) {
          const circle = L.circleMarker(point, {
            radius: 6,
            color: '#1d4ed8',
            fillColor: '#60a5fa',
            fillOpacity: 0.8,
            weight: 2
          }).addTo(map);

          circle.bringToFront();
          historyMarkers.push(circle);
        });

        if (shouldFit) {
          fitHistory(latlngs);
        }

      } catch (err) {
        console.warn('GPS history update failed', err);
      }
    }

    async function updateGPS() {
      try {
        const response = await fetch('/cgi-bin/gps.json?_=' + Date.now());
        const data = await response.json();

        const lat = parseFloat(data.latitude);
        const lon = parseFloat(data.longitude);

        if (isNaN(lat) || isNaN(lon)) {
          document.getElementById('coords').textContent = 'Keine gültigen GPS-Daten';
          document.getElementById('satfix').textContent = '-';
          return;
        }

        document.getElementById('coords').textContent = lat.toFixed(6) + ', ' + lon.toFixed(6);
        document.getElementById('satfix').textContent = formatDateTime(data.datetime);
        document.getElementById('googlemaps').href = 'https://www.google.com/maps?q=' + lat + ',' + lon;

        marker.setLatLng([lat, lon]);
        lastLat = lat;
        lastLon = lon;

        if (firstFix) {
          map.setView([lat, lon], DEFAULT_ZOOM);
          firstFix = false;
        }

      } catch (err) {
        document.getElementById('coords').textContent = 'GPS Fehler';
        document.getElementById('satfix').textContent = '-';
      }
    }

    document.querySelectorAll('.track-tab').forEach(function(button) {
      button.addEventListener('click', function() {
        document.querySelectorAll('.track-tab').forEach(function(item) {
          item.classList.remove('active');
        });

        button.classList.add('active');
        currentRange = button.dataset.range;
        fromDateInput.value = '';
        toDateInput.value = '';
        customFrom = '';
        customTo = '';
        rangeError.textContent = '';
        setExportState(false);
        updateHistory({ fit: true });
      });
    });

    [fromDateInput, toDateInput].forEach(function(input) {
      input.addEventListener('change', function() {
        document.querySelectorAll('.track-tab').forEach(function(item) {
          item.classList.remove('active');
        });

        if (validateCustomRange()) {
          updateHistory({ fit: true });
        }
      });
    });

    updateGPS();
    updateHistory({ fit: true });

    setInterval(updateGPS, 5000);
    setInterval(function() {
      updateHistory({ fit: false });
    }, 5000);
  </script>
</body>
</html>
