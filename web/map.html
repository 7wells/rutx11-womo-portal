<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WoMo Karte</title>
  <meta name="theme-color" content="#2563eb">
  <link rel="stylesheet" href="/assets/leaflet/leaflet.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0b132b;
      color: white;
      font-family: system-ui, sans-serif;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .info {
      position: absolute;
      z-index: 1000;
      top: 10px;
      left: 10px;
      right: 10px;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(11, 19, 43, 0.92);
      backdrop-filter: blur(6px);
      font-size: 0.82rem;
      line-height: 1.3;
      box-shadow: 0 4px 12px rgba(0,0,0,.3);
    }

    .gps-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .gps-title {
      font-weight: 700;
    }

    .gps-sub {
      margin-top: 2px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      color: #b8c1d1;
    }

    .info a {
      color: #93c5fd;
      text-decoration: none;
      font-weight: 600;
      white-space: nowrap;
    }

    .track-tabs {
      display: flex;
      gap: 5px;
      white-space: nowrap;
    }

    .track-tab {
      border: 0;
      border-radius: 999px;
      padding: 4px 8px;
      background: rgba(255,255,255,0.16);
      color: #f3f4f6;
      font-size: 0.76rem;
      font-weight: 600;
    }

    .track-tab.active {
      background: #2563eb;
      color: white;
    }

    .leaflet-bottom.leaflet-right {
      bottom: 14px;
      right: 10px;
    }

    .reset-zoom {
      width: 30px;
      height: 30px;
      line-height: 30px;
      display: block;
      text-align: center;
      background: white;
      color: black;
      text-decoration: none;
      font: bold 15px Arial, sans-serif;
      border-top: 1px solid #ccc;
    }

    @media (prefers-color-scheme: light) {
      .info {
        background: rgba(255,255,255,0.92);
        color: #111827;
      }

      .gps-sub {
        color: #374151;
      }

      .info a {
        color: #1d4ed8;
      }

      .track-tab {
        background: rgba(17,24,39,0.10);
        color: #111827;
      }

      .track-tab.active {
        background: #2563eb;
        color: white;
      }
    }
  </style>
</head>

<body>
  <div class="info">
    <div class="gps-row">
      <div>
        <span class="gps-title">WoMo GPS:</span>
        <br>
        <span id="coords">Lade GPS...</span>
      </div>

      <div class="track-tabs">
        <button class="track-tab active" data-range="1h">Live</button>
        <button class="track-tab" data-range="24h">24h</button>
        <button class="track-tab" data-range="4w">4w</button>
      </div>
    </div>

    <div class="gps-sub">
      <span>Sat fix: <span id="satfix">-</span></span>
      <a id="googlemaps" href="#" target="_blank" rel="noopener noreferrer">Google Maps</a>
    </div>
  </div>

  <div id="map"></div>

  <script src="/assets/leaflet/leaflet.js"></script>

  <script>
    const DEFAULT_ZOOM = 16;
    const MAX_ZOOM = 19;

    let currentRange = '1h';

    const map = L.map('map', { zoomControl: false }).setView([51.0, 10.0], DEFAULT_ZOOM);

    const zoomControl = L.control.zoom({ position: 'bottomright' }).addTo(map);
    L.DomUtil.create('a', 'reset-zoom', zoomControl._container);

    const resetButton = zoomControl._container.querySelector('.reset-zoom');
    resetButton.href = '#';
    resetButton.title = 'Zoom zurücksetzen';
    resetButton.textContent = '⦿';

    const marker = L.marker([51.0, 10.0]).addTo(map);
    let historyLine = null;
    let historyMarkers = [];
    let firstFix = true;
    let lastLat = null;
    let lastLon = null;

    resetButton.addEventListener('click', function (event) {
      event.preventDefault();

      if (lastLat !== null && lastLon !== null) {
        map.setView([lastLat, lastLon], DEFAULT_ZOOM);
      } else {
        map.setZoom(DEFAULT_ZOOM);
      }
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors',
      maxZoom: MAX_ZOOM
    }).addTo(map);

    function formatDateTime(value) {
      if (!value) return '-';

      const parts = value.split(' ');
      if (parts.length !== 2) return value;

      const dateParts = parts[0].split('-');
      if (dateParts.length !== 3) return value;

      return dateParts[2] + '.' + dateParts[1] + '.' + dateParts[0] + ', ' + parts[1];
    }

    async function updateHistory() {
      try {
        const response = await fetch('/cgi-bin/gps_track.cgi?range=' + currentRange + '&_=' + Date.now());
        const history = await response.json();

        if (historyLine) {
          map.removeLayer(historyLine);
        }

        historyMarkers.forEach(function(item) {
          map.removeLayer(item);
        });

        historyMarkers = [];

        if (!Array.isArray(history) || history.length < 2) {
          return;
        }

        const latlngs = history.map(function(point) {
          return [point.lat, point.lon];
        });

        historyLine = L.polyline(latlngs, {
          color: '#60a5fa',
          weight: 3,
          opacity: 0.7
        }).addTo(map);

        history.forEach(function(point) {
          const circle = L.circleMarker([point.lat, point.lon], {
            radius: 4,
            color: '#93c5fd',
            fillColor: '#93c5fd',
            fillOpacity: 0.8,
            weight: 1
          }).addTo(map);

          historyMarkers.push(circle);
        });

      } catch (err) {
      }
    }

    async function updateGPS() {
      try {
        const response = await fetch('/cgi-bin/gps.json?_=' + Date.now());
        const data = await response.json();

        const lat = parseFloat(data.latitude);
        const lon = parseFloat(data.longitude);

        if (isNaN(lat) || isNaN(lon)) {
          document.getElementById('coords').textContent = 'Keine gültigen GPS-Daten';
          document.getElementById('satfix').textContent = '-';
          return;
        }

        document.getElementById('coords').textContent = lat.toFixed(6) + ', ' + lon.toFixed(6);
        document.getElementById('satfix').textContent = formatDateTime(data.datetime);
        document.getElementById('googlemaps').href = 'https://www.google.com/maps?q=' + lat + ',' + lon;

        marker.setLatLng([lat, lon]);
        lastLat = lat;
        lastLon = lon;

        if (firstFix) {
          map.setView([lat, lon], DEFAULT_ZOOM);
          firstFix = false;
        }

      } catch (err) {
        document.getElementById('coords').textContent = 'GPS Fehler';
        document.getElementById('satfix').textContent = '-';
      }
    }

    document.querySelectorAll('.track-tab').forEach(function(button) {
      button.addEventListener('click', function() {
        document.querySelectorAll('.track-tab').forEach(function(item) {
          item.classList.remove('active');
        });

        button.classList.add('active');
        currentRange = button.dataset.range;
        updateHistory();
      });
    });

    updateGPS();
    updateHistory();

    setInterval(updateGPS, 5000);
    setInterval(updateHistory, 5000);
  </script>
</body>
</html>
